{% extends "layout.html" %}
{% block module_content %}
{% if error %}<p class="form-error">{{ error }}</p>{% endif %}
<form method="post" class="settings-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <label>Username
    <input type="text" name="username" value="{{ user.username if user else '' }}" required>
  </label>
  <label>Display name
    <input type="text" name="display_name" value="{{ user.display_name if user else '' }}" required>
  </label>
  <label>Role
    {% set role = user.role if user else 'user' %}
    <select name="role">
      <option value="admin" {% if role == 'admin' %}selected{% endif %}>Admin</option>
      <option value="user" {% if role == 'user' %}selected{% endif %}>User</option>
      <option value="guest" {% if role == 'guest' %}selected{% endif %}>Guest</option>
    </select>
  </label>
  {% if user %}
    <label>
      <input type="checkbox" name="is_active" value="1" {% if user.is_active %}checked{% endif %}>
      Active
    </label>
  {% else %}
    <label>Password
      <input type="password" name="password" autocomplete="new-password" required>
    </label>
  {% endif %}
  <fieldset>
    <legend>File roots</legend>
    <label>User root
      <input type="text" name="file_root_path" value="{{ user_paths.file_root_path if user_paths else '' }}">
    </label>
    <label>Notes root
      <input type="text" name="notes_root_path" value="{{ user_paths.notes_root_path if user_paths else '' }}">
    </label>
    <label>Projects root
      <input type="text" name="projects_root_path" value="{{ user_paths.projects_root_path if user_paths else '' }}">
    </label>
    <label>Lists root
      <input type="text" name="lists_root_path" value="{{ user_paths.lists_root_path if user_paths else '' }}">
    </label>
  </fieldset>
  <label>Pocket default note folder
    <input type="text" name="pocket_default_note_folder" value="{{ (pocket_settings.default_note_folder if pocket_settings else '') or (user_paths.notes_root_path if user_paths else '') }}">
  </label>
  <p class="form-help">New mobile-only notes for this user are saved here. By default this matches the notes root.</p>
  <button type="submit">Save</button>
</form>
{% endblock %}
