<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>LifePIM Public Blog</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='lifepim.css') }}">
</head>
<body>
  <main class="main">
    <h1>LifePIM Blog</h1>
    {% for note in notes %}
      <article>
        <h2><a href="{{ url_for('public.public_note_route', note_id=note.id) }}">{{ note.file_name }}</a></h2>
      </article>
    {% else %}
      <p>No public posts.</p>
    {% endfor %}
  </main>
</body>
</html>
