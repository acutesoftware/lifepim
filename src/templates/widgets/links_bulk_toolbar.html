<div class="link-bulk-toolbar"
     data-list-type="{{ link_list_type }}"
     data-context-id="{{ link_list_context_id }}"
     data-table-id="{{ link_table_id }}">
  <span class="link-bulk-count">0 selected</span>
  <select class="link-bulk-action" aria-label="Selected" disabled>
    <option value="">Selected</option>
    {% if link_list_type == "note" %}
      <option value="link">Link selected notes to ...</option>
      <option value="delete">Delete Selected notes</option>
    {% else %}
      <option value="link">Link selected records to ...</option>
    {% endif %}
  </select>
</div>
