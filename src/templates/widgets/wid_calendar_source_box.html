<form class="calendar-source-box" method="get" action="{{ source_action_url }}">
  {% for field in source_hidden_fields %}
    <input type="hidden" name="{{ field.name }}" value="{{ field.value }}">
  {% endfor %}
  <span class="calendar-source-caption">Calendars / Sources:</span>
  {% for source in day_sources.rows %}
    <label>
      <input type="checkbox" name="source" value="{{ source.source_key }}" {% if source.source_key in day_sources.selected %}checked{% endif %}>
      {{ source.source_name }}
    </label>
  {% endfor %}
  <button type="submit">Apply</button>
</form>
